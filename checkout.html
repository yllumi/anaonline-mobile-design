<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anaonline — Checkout</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --green-dark:  #1b5e2e;
      --green-mid:   #2d7a3e;
      --green-light: #eaf6ed;
      --green-pale:  #d4edda;
      --yellow:      #f5c842;
      --yellow-dark: #6b4c00;
      --text-main:   #1a1a1a;
      --text-sub:    #6b7280;
      --border:      #e4e7e2;
      --bg:          #f4f7f2;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
    }

    .app-shell {
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .app-header {
      background: var(--green-dark);
      padding: 1.25rem 1.25rem 1.4rem;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .glow { position: absolute; border-radius: 50%; filter: blur(44px); pointer-events: none; }
    .glow-1 { width: 180px; height: 180px; background: rgba(120,210,100,.28); top: -60px; right: -40px; }
    .glow-2 { width: 120px; height: 120px; background: rgba(245,200,66,.2);  top: 10px;  right: 60px; }
    .glow-3 { width: 100px; height: 100px; background: rgba(60,180,110,.18); bottom: -20px; left: 10px; }

    .header-inner {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: .75rem;
    }
    .back-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,.14); border: none;
      color: #fff; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: pointer;
      text-decoration: none;
    }
    .page-title {
      font-size: 1.1rem; font-weight: 700; color: #fff;
      flex: 1; text-align: center; margin-right: 34px;
    }

    /* ── Scroll body ── */
    .scroll-body {
      flex: 1;
      padding: 1.1rem 1rem 1.5rem;
      display: flex; flex-direction: column; gap: 1rem;
      overflow-y: auto;
    }

    /* ── Cards ── */
    .co-card {
      background: #fff;
      border-radius: 16px;
      border: .5px solid var(--border);
      box-shadow: 0 2px 10px rgba(0,0,0,.04);
      overflow: hidden;
    }
    .co-card-title {
      font-size: .9rem; font-weight: 700;
      padding: .85rem 1rem .7rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Item row ── */
    .item-row {
      padding: .85rem 1rem;
      display: flex; align-items: flex-start; gap: .85rem;
    }
    .item-icon {
      width: 46px; height: 46px; border-radius: 12px;
      background: var(--green-mid);
      color: #fff; font-size: 1.35rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .item-name  { font-size: .9rem; font-weight: 700; margin-bottom: 2px; }
    .item-by    { font-size: .75rem; color: var(--text-sub); margin-bottom: .5rem; }
    .item-price-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .item-qty   { font-size: .8rem; color: var(--text-sub); }
    .item-total { font-size: .95rem; font-weight: 700; color: var(--green-mid); }

    /* Multi items */
    .item-row + .item-row { border-top: 1px solid var(--border); }

    /* ── Detail pembayaran ── */
    .detail-rows { padding: .25rem 0; }
    .detail-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: .7rem 1rem;
      font-size: .85rem;
    }
    .detail-row + .detail-row { border-top: 1px solid var(--border); }
    .detail-row .lbl { color: var(--text-main); }
    .detail-row .lbl .count {
      font-size: .72rem; color: var(--text-sub);
      margin-left: 4px;
    }
    .detail-row .val { font-weight: 600; color: var(--green-mid); }
    .detail-row.total-row .lbl { font-weight: 700; font-size: .9rem; }
    .detail-row.total-row .val { font-size: 1rem; font-weight: 700; }

    /* ── Payment method ── */
    .pay-method {
      border: 1.5px solid var(--green-mid);
      border-radius: 12px;
      margin: 0 1rem 1rem;
      overflow: hidden;
    }
    .pay-method-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .75rem .9rem;
      cursor: pointer;
      background: #fff;
    }
    .pay-method-header:hover { background: var(--green-light); }
    .qris-logo {
      display: flex; align-items: center; gap: 2px;
      font-size: 1rem; font-weight: 900; letter-spacing: -1px;
      color: var(--text-main);
    }
    .qris-logo .q-box {
      width: 22px; height: 22px; border: 2.5px solid var(--text-main);
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; font-weight: 900; margin-right: 2px;
    }
    .method-name { font-size: .9rem; font-weight: 600; flex: 1; margin-left: .6rem; }
    .method-arrow { color: var(--text-sub); font-size: 1rem; }

    .secure-badge {
      background: var(--green-light);
      padding: .7rem .9rem;
      display: flex; align-items: center; gap: .75rem;
      border-top: 1px solid var(--green-pale);
    }
    .shield-wrap {
      width: 42px; height: 42px;
      flex-shrink: 0;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .shield-wrap i.shield { font-size: 3rem; color: var(--green-mid); }
    .shield-wrap i.lock {
      position: absolute; font-size: 1.55rem;
      color: var(--yellow); bottom: 8px;
    }
    .secure-text h4 { font-size: .82rem; font-weight: 700; margin: 0 0 2px; color: var(--text-main); }
    .secure-text p  { font-size: .72rem; color: var(--text-sub); margin: 0; line-height: 1.4; }

    /* ── Pay button ── */
    .btn-pay {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      background: var(--green-dark);
      color: #fff;
      border: none; border-radius: 14px;
      padding: .95rem 1.5rem;
      font-family: inherit;
      font-size: .95rem; font-weight: 700;
      letter-spacing: .3px;
      cursor: pointer;
      width: 100%;
      transition: background .18s, transform .1s;
    }
    .btn-pay:hover  { background: #154d24; }
    .btn-pay:active { transform: scale(.98); }
    .btn-pay .dot   { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,.5); }
    .btn-pay .amt   { color: var(--yellow); font-weight: 800; }

    /* ── Terms ── */
    .terms-note {
      text-align: center; font-size: .68rem; color: var(--text-sub);
      padding: 0 .5rem .5rem; line-height: 1.5;
    }
    .terms-note a { color: var(--green-mid); text-decoration: none; font-weight: 600; }

    /* desktop frame */
    @media (min-width: 480px) {
      body { background: #e8ede6; }
      .app-shell {
        margin: 2rem auto; border-radius: 36px; overflow: hidden;
        box-shadow: 0 20px 60px rgba(0,0,0,.18);
        min-height: 820px;
      }
    }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- ── HEADER ── -->
  <header class="app-header">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
    <div class="header-inner">
      <a href="javascript:history.back()" class="back-btn" aria-label="Kembali"><i class="ti ti-arrow-left"></i></a>
      <h1 class="page-title mb-0">Checkout</h1>
    </div>
  </header>

  <!-- ── SCROLL BODY ── -->
  <div class="scroll-body">

    <!-- Item -->
    <div class="co-card">
      <p class="co-card-title mb-0">Item</p>
      <div id="item-list">
        <!-- rendered by JS -->
      </div>
    </div>

    <!-- Detail Pembayaran -->
    <div class="co-card">
      <p class="co-card-title mb-0">Detail Pembayaran</p>
      <div class="detail-rows">
        <div class="detail-row">
          <span class="lbl">Items <span class="count" id="item-count">(1)</span></span>
          <span class="val" id="subtotal-val">Rp 20.000</span>
        </div>
        <div class="detail-row">
          <span class="lbl">Biaya Admin</span>
          <span class="val" id="admin-val">Rp 142</span>
        </div>
        <div class="detail-row total-row">
          <span class="lbl">Total</span>
          <span class="val" id="total-val">Rp 20.142</span>
        </div>
      </div>

      <!-- Payment method -->
      <div class="pay-method">
        <div class="pay-method-header" onclick="changeMethod()">
          <div class="qris-logo">
            <div class="q-box">QR</div>
            <span>IS</span>
          </div>
          <span class="method-name">QRIS</span>
          <i class="ti ti-chevron-right method-arrow"></i>
        </div>
        <div class="secure-badge">
          <div class="shield-wrap">
            <i class="ti ti-shield-filled shield"></i>
            <i class="ti ti-lock lock"></i>
          </div>
          <div class="secure-text">
            <h4>Secure Payment</h4>
            <p>All of your payments are RSA security encrypted</p>
          </div>
        </div>
      </div>

      <!-- Pay button -->
      <div style="padding: 0 1rem .85rem;">
        <button class="btn-pay" onclick="handlePay()" id="btn-pay">
          BAYAR
          <span class="dot"></span>
          <span class="amt" id="btn-amt">Rp 20.142</span>
        </button>
      </div>

      <p class="terms-note">
        Dengan melanjutkan, kamu menyetujui
        <a href="#">Syarat &amp; Ketentuan</a> dan
        <a href="#">Kebijakan Privasi</a> Anaonline.
      </p>
    </div>

  </div><!-- /scroll-body -->
</div><!-- /app-shell -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const ADMIN_RATE = 0.0071; // ~0.7% flat illustrative

  const items = [
    { nama: 'Iuran Juni 2026',  by: 'Toni Haryanto', nominal: 20000, qty: 1 },
  ];

  function fmt(n) {
    return 'Rp ' + n.toLocaleString('id-ID');
  }

  function renderItems() {
    const el = document.getElementById('item-list');
    el.innerHTML = items.map(item => `
      <div class="item-row">
        <div class="item-icon"><i class="ti ti-file-text"></i></div>
        <div class="flex-grow-1">
          <p class="item-name mb-0">${item.nama}</p>
          <p class="item-by mb-0">${item.by}</p>
          <div class="item-price-row">
            <span class="item-qty">${fmt(item.nominal)} x ${item.qty}</span>
            <span class="item-total">${fmt(item.nominal * item.qty)}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  function renderSummary() {
    const subtotal = items.reduce((s, i) => s + i.nominal * i.qty, 0);
    const admin    = Math.round(subtotal * ADMIN_RATE);
    const total    = subtotal + admin;

    document.getElementById('item-count').textContent  = `(${items.length})`;
    document.getElementById('subtotal-val').textContent = fmt(subtotal);
    document.getElementById('admin-val').textContent    = fmt(admin);
    document.getElementById('total-val').textContent    = fmt(total);
    document.getElementById('btn-amt').textContent      = fmt(total);
  }

  function changeMethod() {
    alert('Pilih metode pembayaran lain\n(fitur dalam pengembangan)');
  }

  function handlePay() {
    const subtotal = items.reduce((s, i) => s + i.nominal * i.qty, 0);
    const admin    = Math.round(subtotal * ADMIN_RATE);
    const total    = subtotal + admin;
    const btn      = document.getElementById('btn-pay');

    btn.disabled = true;
    btn.textContent = 'Memproses…';

    setTimeout(() => {
      alert(`✅ Pembayaran berhasil!\nTotal: ${fmt(total)}\nMetode: QRIS`);
      btn.disabled = false;
      renderItems();
      renderSummary();
    }, 1800);
  }

  renderItems();
  renderSummary();
</script>
</body>
</html>
